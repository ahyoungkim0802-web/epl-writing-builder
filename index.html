<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EPL Studio · 라이팅빌더 + 평가지</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600&family=IBM+Plex+Sans+KR:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--paper:#FCFAF5;--ink:#2B2622;--soft:#6B6258;--line:#D8CFBF;--line-2:#C9C0B0;
  --who:#5E7C92;--did:#C26544;--what:#C79A3A;--be:#7E9460;}
*{box-sizing:border-box;}
body{margin:0;background:#E7E2D8;color:var(--ink);font-family:'IBM Plex Sans KR',sans-serif;font-weight:300;}
.f{font-family:'Fraunces',serif;}
.controls{position:sticky;top:0;z-index:20;background:#2B2622;color:#F3ECDF;padding:15px 22px;box-shadow:0 2px 10px rgba(0,0,0,.2);}
.controls .title{font-family:'Fraunces',serif;font-weight:600;font-size:16px;margin-bottom:12px;}
.controls .title span{font-family:'IBM Plex Sans KR';font-weight:300;font-size:12.5px;color:#C9BFAE;margin-left:8px;}
.crow{display:flex;flex-wrap:wrap;gap:16px;align-items:flex-end;}
.fld{display:flex;flex-direction:column;gap:4px;}
.fld label{font-size:11px;color:#C9BFAE;}
.fld select,.fld input{font-family:'IBM Plex Sans KR';font-size:14px;padding:8px 11px;border:none;border-radius:8px;background:#F3ECDF;color:#2B2622;}
.fld input[type=number]{width:78px;}
.btn{font-family:'IBM Plex Sans KR';font-weight:500;font-size:14px;border:none;border-radius:8px;padding:10px 20px;cursor:pointer;}
.btn.go{background:#C26544;color:#fff;}.btn.go:hover{background:#a9542f;}.btn.go:disabled{opacity:.55;}
.btn.print{background:transparent;color:#F3ECDF;border:1px solid #6B6258;}
.status{font-size:12.5px;color:#C9BFAE;}
.spin{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;vertical-align:-2px;margin-right:6px;}
@keyframes sp{to{transform:rotate(360deg);}}

#out{padding:20px 0 60px;}
.sheet{background:#fff;width:210mm;max-width:96vw;margin:18px auto;padding:14mm 15mm;position:relative;box-shadow:0 3px 22px rgba(0,0,0,.12);height:296mm;display:flex;flex-direction:column;box-sizing:border-box;overflow:hidden;}
.top{display:flex;justify-content:space-between;align-items:baseline;color:var(--soft);font-size:13px;margin-bottom:14px;}
.top .bk u{display:inline-block;min-width:160px;border-bottom:1px solid var(--line-2);}
.top .no{font-family:'Fraunces',serif;font-style:italic;}
.struct{margin-bottom:14px;}
.struct .nm{font-family:'Fraunces',serif;font-weight:600;font-size:21px;}
.struct .sub{font-size:13px;color:var(--soft);margin-top:2px;}

.cards{display:flex;gap:8px;margin-bottom:6px;}
.card{flex:1;text-align:center;}
.card .lab{border:1.5px solid var(--line-2);border-radius:10px;padding:9px 0;font-family:'Fraunces',serif;font-weight:600;font-size:17px;background:var(--paper);}
.card.who .lab{color:var(--who);}.card.did .lab{color:var(--did);}.card.what .lab{color:var(--what);}
.brain{display:flex;gap:8px;margin-bottom:18px;}
.brain .c{flex:1;height:24px;border-bottom:1px dashed var(--line-2);}

.block-h{font-family:'Fraunces',serif;font-weight:600;font-size:14px;color:var(--ink);margin:0 0 6px;border-bottom:1px solid var(--line);padding-bottom:5px;}
.block-h span{font-family:'IBM Plex Sans KR';font-weight:300;font-size:11.5px;color:var(--soft);margin-left:6px;}
.exlist{margin:0 0 18px;}
.exlist .ex{display:flex;gap:10px;padding:5px 0;font-size:14.5px;align-items:baseline;}
.exlist .ex .n{font-family:'Fraunces',serif;font-style:italic;color:var(--soft);font-size:12px;flex:0 0 14px;}
.exlist .ex .en{font-family:'Fraunces',serif;flex:1;}
.exlist .ex .ko{font-size:12px;color:var(--soft);flex:0 0 40%;text-align:right;}
.line{height:31px;border-bottom:1px solid var(--line);}
/* 구조 연습 (가이드 드릴) */
.prac{flex:1;display:flex;flex-direction:column;justify-content:space-around;min-height:0;padding:4px 0;}
.prac .item .q{font-size:14.5px;}
.prac .item .q .n{font-family:'Fraunces',serif;font-style:italic;color:var(--did);font-size:12px;margin-right:8px;}
.prac .item .q .hint{color:var(--soft);font-size:12px;margin-left:6px;}
.prac .item .ln{height:30px;border-bottom:1px solid var(--line);margin-top:8px;}
.prac .item .q .bl{display:inline-block;min-width:44px;border-bottom:1.4px solid var(--soft);margin:0 3px;vertical-align:baseline;}
/* Words box */
.wordbox{border:1px solid var(--line);border-radius:10px;padding:11px 16px;background:var(--paper);margin-top:10px;}
.wordbox .wh{font-family:'Fraunces',serif;font-weight:600;font-size:13px;color:var(--ink);margin-bottom:7px;}
.wordbox .wh span{font-family:'IBM Plex Sans KR';font-weight:300;font-size:11px;color:var(--soft);margin-left:6px;}
.wordbox .chips{display:flex;flex-wrap:wrap;gap:6px 14px;}
.wordbox .chip{font-family:'Fraunces',serif;font-size:14px;color:var(--ink);}
.practice .line{margin-top:9px;}
/* 남은 공간을 균등하게 채우는 줄 */
.fillzone{flex:1;display:flex;flex-direction:column;min-height:0;}
.fillzone .fl{flex:1;min-height:36px;border-bottom:1px solid var(--line);}

.think{margin-bottom:6px;}
.think .row{display:flex;align-items:flex-end;gap:12px;margin-bottom:17px;}
.think .row .q{flex:0 0 150px;font-family:'Fraunces',serif;font-weight:600;font-size:14px;color:var(--did);line-height:1.3;}
.think .row .q small{display:block;font-family:'IBM Plex Sans KR';font-weight:300;font-size:11px;color:var(--soft);}
.think .row .l{flex:1;height:22px;border-bottom:1px solid var(--line);}
/* 상위 단계: 생각 정리를 페이지 가득 펼침 */
.think.spread{flex:1;display:flex;flex-direction:column;justify-content:space-around;}
.think.spread .row{margin-bottom:0;}
/* 크리티컬 라이팅 페이지 */
.crit{flex:1;display:flex;flex-direction:column;}
.csec{flex:1;display:flex;flex-direction:column;padding:3px 0;}
.csec .clab{font-family:'Fraunces',serif;font-weight:600;font-size:13.5px;color:var(--did);margin-bottom:3px;}
.csec .clab small{font-family:'IBM Plex Sans KR';font-weight:300;font-size:11px;color:var(--soft);margin-left:6px;}
.csec .fillzone{flex:1;}
/* 한 장형 크리티컬: 라벨 + 촘촘한 노트 줄 */
.csec2{margin-bottom:6px;}
.csec2 .clab{font-family:'Fraunces',serif;font-weight:600;font-size:13px;color:var(--did);margin-bottom:2px;}
.csec2 .clab small{font-family:'IBM Plex Sans KR';font-weight:300;font-size:11px;color:var(--soft);margin-left:6px;}
.nl{height:25px;border-bottom:1px solid var(--line);}
/* 배운 구조 활용 안내 */
.usebox{border:1px dashed var(--line-2);border-radius:8px;padding:8px 13px;margin:4px 0 10px;background:var(--paper);}
.usebox .ut{font-size:12.5px;color:var(--ink);font-weight:500;}
.usebox .uchips{display:flex;flex-wrap:wrap;gap:6px 14px;margin-top:5px;}
.usebox .uchip{font-size:12.5px;color:var(--ink);}
.usebox .uchip i{font-family:'Fraunces',serif;font-style:italic;color:var(--soft);font-size:12px;margin-left:3px;}
/* 워크북: 표지·커리큘럼·원서 박스 */
/* ===== 딥톤 컬러블록 표지 ===== */
.cover.deep{padding:0;display:flex;flex-direction:column;overflow:hidden;}
.cv-top{height:33%;display:flex;flex-direction:column;justify-content:center;align-items:center;background:#fff;}
.cv-brandmark{font-family:'Fraunces',serif;font-weight:700;font-size:26px;letter-spacing:6px;color:var(--ink);}
.cv-brandsub{font-size:10px;letter-spacing:4px;color:var(--soft);margin-top:6px;}
.cv-block{flex:1;background:var(--acc);position:relative;display:flex;flex-direction:column;align-items:center;text-align:center;padding:44mm 24mm 18mm;}
.cv-symwrap{width:118px;height:118px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;margin-top:-59px;box-shadow:0 6px 24px rgba(0,0,0,.12);}
.cv-sym{width:66px;height:66px;color:var(--acc);}
.cv-sym svg{width:100%;height:100%;display:block;background:transparent;overflow:visible;border:none;outline:none;fill:none;stroke:currentColor;stroke-width:3.4;stroke-linecap:round;stroke-linejoin:round;}
.cv-block .cv-badge{margin-top:0;font-family:'Fraunces',serif;font-size:13px;letter-spacing:6px;color:var(--sub);}
.cv-lvtitle{font-family:'Fraunces',serif;font-weight:700;font-size:40px;color:#fff;line-height:1.1;margin-top:14px;padding:0 6px;}
.cv-block .cv-struct{font-size:13px;color:var(--sub);margin-top:12px;}
.cv-rule{width:48px;height:2.5px;background:var(--sub);margin:22px auto;}
.cv-loop{font-size:11px;color:var(--sub);opacity:.9;letter-spacing:.3px;}
.cv-prod{font-family:'Fraunces',serif;font-style:italic;font-size:13px;color:var(--sub);margin-top:auto;padding-top:22px;}
.cv-block .cv-meta{margin-top:14px;font-size:11px;color:#fff;background:rgba(255,255,255,.14);border-radius:5px;padding:7px 0;width:74%;}
.cv-brand{font-size:12px;color:var(--soft);letter-spacing:2px;margin-bottom:46px;}
.cv-title{font-family:'Fraunces',serif;font-weight:600;font-size:46px;line-height:1.1;}
.cv-sub{font-size:15px;color:var(--soft);margin-top:12px;}
.cv-stage{font-family:'Fraunces',serif;font-size:22px;color:var(--did);margin-top:64px;}
.cv-struct{font-size:13.5px;color:var(--soft);margin-top:8px;}
.cv-meta{font-size:13px;color:var(--soft);margin-top:90px;}
.cu-intro{font-size:13px;color:var(--soft);margin-bottom:16px;line-height:1.6;}
.cu{display:flex;flex-direction:column;flex:1;justify-content:space-between;}
.cu-row{display:flex;align-items:baseline;gap:11px;border-bottom:1px solid var(--line);padding:6px 0 12px;}
.cu-n{font-family:'Fraunces',serif;font-style:italic;color:var(--did);flex:0 0 66px;font-size:13px;}
.cu-f{font-size:14px;}.cu-f i{font-family:'Fraunces',serif;font-style:italic;color:var(--soft);font-size:12px;margin-left:4px;}
.cu-rev{font-size:11px;color:var(--soft);margin-left:auto;text-align:right;}
.cu-cyc{font-family:'Fraunces',serif;font-style:italic;color:var(--did);font-size:13px;margin:4px 0 8px;}
.cu-foot{margin-top:14px;padding-top:10px;border-top:1px dashed var(--line-2);font-size:13px;color:var(--soft);text-align:center;}
.readbox{border:1px solid var(--did);border-radius:10px;padding:11px 15px;margin-bottom:14px;background:#FBF4EF;}
.readbox .bwh{font-family:'Fraunces',serif;font-weight:600;font-size:14px;color:var(--did);margin-bottom:9px;}
.readbox .bwh span{font-family:'IBM Plex Sans KR';font-weight:300;font-size:11px;color:var(--soft);margin-left:6px;}
.bwgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px 26px;}
.bw{height:24px;border-bottom:1px solid var(--line-2);display:flex;align-items:flex-end;}
.loopbox{border:1px solid var(--did);border-radius:10px;padding:12px 14px;margin:6px 0 16px;text-align:center;background:#FBF4EF;font-family:'Fraunces',serif;font-size:14px;color:var(--did);}
.loopbox b{color:var(--ink);}
.loopbox small{display:block;font-family:'IBM Plex Sans KR';font-weight:300;font-size:11px;color:var(--soft);margin-top:4px;}
.bwn{font-family:'Fraunces',serif;font-style:italic;color:var(--soft);font-size:10px;margin-bottom:1px;}
/* 직접 문장 만들기 */
.makelist{flex:1;display:flex;flex-direction:column;justify-content:space-around;margin-top:6px;}
.mk{display:flex;align-items:flex-end;gap:10px;}
.mk .mn{font-family:'Fraunces',serif;font-style:italic;color:var(--soft);font-size:13px;flex:0 0 16px;}
.mk .ml{flex:1;border-bottom:1px solid var(--line);height:22px;}
.sf-meta{display:flex;align-items:baseline;gap:6px;font-size:13px;color:var(--ink);margin:8px 0 4px;flex-wrap:wrap;}
.sf-meta span{color:var(--soft);font-size:12px;}
.sf-meta u{display:inline-block;border-bottom:1px solid var(--line-2);min-width:210px;margin-right:16px;}
.sf-meta2{margin:12px 0 6px;}
  .sf-meta2 .mrow{display:flex;align-items:flex-end;gap:8px;margin-bottom:12px;}
  .sf-meta2 .mrow span{font-size:12px;color:var(--soft);white-space:nowrap;}
  .sf-meta2 .mrow u{flex:1;border-bottom:1px solid var(--line-2);height:22px;text-decoration:none;}
  .sl{display:flex;align-items:flex-end;gap:8px;margin-top:16px;}
.sl .st{font-family:'Fraunces',serif;font-style:italic;color:var(--soft);font-size:14px;white-space:nowrap;}
.sl .sline{flex:1;border-bottom:1px solid var(--line);height:32px;}

.fb{margin-top:20px;border-top:1px solid var(--line);padding-top:12px;display:flex;justify-content:space-between;align-items:flex-start;gap:16px;}
  .fbgrid{flex:1;}
  .fbhead{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;}
  .fbc{font-family:'Fraunces',serif;font-weight:600;font-size:12.5px;color:var(--ink);}
  .fbkey{font-size:10px;color:var(--soft);}
  .fbkey i{color:var(--did);font-style:normal;}
  .fbrow{display:flex;align-items:center;justify-content:space-between;padding:4px 0;border-bottom:1px dotted var(--line);}
  .fbcrit{font-size:12px;color:var(--ink);}
  .fbcrit em{color:var(--soft);font-style:normal;font-size:11px;margin-left:2px;}
  .fbscale{display:flex;gap:10px;}
  .fbscale .lvl{width:22px;height:22px;border:1.4px solid var(--line-2);border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--soft);}
  .DUMMYfb{align-items:center;color:var(--soft);font-size:12.5px;}
.fb .checks{display:flex;gap:14px;flex-wrap:wrap;}
.fb .checks span{display:inline-flex;align-items:center;gap:5px;}
.fb .checks span::before{content:"";width:13px;height:13px;border:1.4px solid var(--line-2);border-radius:3px;}
.fb .stamp{width:46px;height:46px;border:1px dashed var(--line-2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;text-align:center;flex:0 0 46px;}
.logo{margin-top:14px;text-align:right;color:var(--soft);font-size:12px;line-height:1.25;}
.logo b{display:block;font-family:'Fraunces',serif;font-size:14px;color:var(--ink);}

@media print{@page{size:A4;margin:0;}html,body{background:#fff;margin:0;padding:0;}.controls{display:none;}#out{padding:0;margin:0;}.sheet{width:210mm;height:296mm;max-width:none;margin:0;box-shadow:none;overflow:hidden;page-break-after:always;break-after:page;}.sheet:last-child{page-break-after:auto;break-after:auto;}}
@media(max-width:680px){.sheet{padding:28px 20px;}.exlist .ex{flex-wrap:wrap;}.exlist .ex .ko{text-align:left;flex:1;}}

/* ===== 통합 모드 ===== */
.view{display:none;}
.view.active{display:block;}
.mode-bar{position:sticky;top:0;z-index:20;background:#1f1b17;color:#fff;padding:9px 18px;display:flex;gap:10px;align-items:center;}
.mode-bar .mb-title{font-family:'Fraunces',serif;font-weight:600;font-size:15px;margin-right:10px;letter-spacing:.5px;}
.mode-bar .mb-btn{font-family:'IBM Plex Sans KR',sans-serif;font-size:13px;padding:6px 14px;border-radius:20px;border:1px solid #4a423a;background:transparent;color:#c9bfb4;cursor:pointer;}
.mode-bar .mb-btn.active{background:#9a5b3f;color:#fff;border-color:#9a5b3f;}
@media print{.mode-bar{display:none !important;}}
/* ===== 평가지(격리) ===== */
#asmt-view .bar{position:sticky;top:0;z-index:9;background:#2b2622;color:#fff;padding:12px 18px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
#asmt-view .bar select, #asmt-view .bar button{font-family:inherit;font-size:13px;padding:7px 12px;border-radius:7px;border:none;}
#asmt-view .bar select{background:#3b352f;color:#fff;border:1px solid #554d45;}
#asmt-view .bar button{background:var(--did);color:#fff;font-weight:600;cursor:pointer;}
#asmt-view .bar .t{font-family:'Fraunces',serif;font-weight:600;font-size:15px;margin-right:8px;}
#asmt-view .bar .st{font-size:11px;color:#c9bfb4;margin-left:auto;}
#asmt-view #asOut{padding:18px 0;}
#asmt-view .sheet{background:#fff;width:210mm;max-width:96vw;margin:16px auto;padding:15mm 16mm;box-shadow:0 3px 22px rgba(0,0,0,.12);height:296mm;display:flex;flex-direction:column;box-sizing:border-box;overflow:hidden;position:relative;}
#asmt-view .top{display:flex;justify-content:space-between;align-items:baseline;border-bottom:2px solid var(--ink);padding-bottom:8px;margin-bottom:12px;}
#asmt-view .top .bk{font-family:'Fraunces',serif;font-weight:600;font-size:18px;}
#asmt-view .top .no{font-size:11px;color:var(--soft);letter-spacing:1px;}
#asmt-view h2{font-family:'Fraunces',serif;font-weight:600;font-size:15px;margin:2px 0 3px;}
#asmt-view .lead{font-size:11.5px;color:var(--soft);margin-bottom:10px;line-height:1.6;}
#asmt-view .meta{display:flex;gap:20px;font-size:11px;color:var(--soft);margin-bottom:10px;}
#asmt-view .meta u{display:inline-block;min-width:90px;border-bottom:1px solid var(--line-2);}
#asmt-view .items{flex:1;display:flex;flex-direction:column;justify-content:space-around;}
#asmt-view .it{font-size:13px;line-height:1.5;}
#asmt-view .it .n{font-family:'Fraunces',serif;font-style:italic;color:var(--did);margin-right:7px;}
#asmt-view .it .ans{height:22px;border-bottom:1px solid var(--line);margin-top:6px;}
#asmt-view .bl{display:inline-block;min-width:60px;border-bottom:1.3px solid var(--soft);vertical-align:baseline;margin:0 3px;}
#asmt-view .modelbox{background:var(--paper);border:1px solid var(--line-2);border-radius:8px;padding:10px 14px;margin-bottom:12px;display:flex;flex-direction:column;gap:5px;}
#asmt-view .modelbox span{font-family:'Fraunces',serif;font-size:13.5px;color:var(--ink);}
#asmt-view .modelbox span::before{content:"“";color:var(--soft);}
#asmt-view .modelbox span::after{content:"”";color:var(--soft);}
#asmt-view .ecue{font-size:11px;color:var(--did);font-style:normal;}
#asmt-view .ehint{font-size:11px;color:var(--soft);margin:2px 0 8px;line-height:1.5;}
#asmt-view .ehint i{font-family:'Fraunces',serif;color:var(--ink);}
#asmt-view .subh{font-family:'Fraunces',serif;font-weight:600;font-size:12.5px;color:var(--did);margin:10px 0 2px;}
#asmt-view .passage{background:var(--paper);border-left:3px solid var(--did);padding:11px 14px;font-size:12.5px;line-height:1.7;border-radius:0 6px 6px 0;margin-bottom:12px;}
#asmt-view .org{display:grid;gap:10px;flex:1;}
#asmt-view .org.c3{grid-template-columns:repeat(3,1fr);}
#asmt-view .org.c4{grid-template-columns:repeat(2,1fr);}
#asmt-view .ocell{border:1px solid var(--line-2);border-radius:8px;padding:9px 11px;display:flex;flex-direction:column;}
#asmt-view .ocell .lab{font-family:'Fraunces',serif;font-weight:600;font-size:12.5px;color:var(--did);margin-bottom:5px;}
#asmt-view .ocell .fill{flex:1;display:flex;flex-direction:column;justify-content:space-around;}
#asmt-view .ocell .fl{height:20px;border-bottom:1px solid var(--line);}
#asmt-view .wf{flex:1;display:flex;flex-direction:column;}
#asmt-view .wl{height:26px;border-bottom:1px solid var(--line);}
#asmt-view .wfw{flex:1;display:flex;flex-direction:column;justify-content:space-between;padding:6px 0 12px;}
#asmt-view .wlw{border-bottom:1px solid var(--line);}
#asmt-view .wzone{margin-top:12px;display:flex;flex-direction:column;gap:34px;}
#asmt-view .wzone.wfw{flex:1;justify-content:space-between;gap:0;}
#asmt-view .wzone.wfw .wrow{flex:0 0 auto;}
#asmt-view .wzone.wfw .wl2{flex:1;min-height:34px;}
#asmt-view .wzone.wfw .wrow .wl2{flex:0 0 auto;height:0;margin-top:8px;}
#asmt-view .wrow{display:flex;flex-direction:column;gap:8px;}
#asmt-view .wrow .starter{font-family:'Fraunces',serif;font-style:italic;color:var(--soft);font-size:14px;}

function genItems(stage,n){
  const gs=stage.gens, per=Math.ceil(n/gs.length)+3;
  const pools=gs.map(g=>(GEN[g]||GEN.g1)(per));
  const out=[];
  for(let i=0;i<n;i++){const p=pools[i%gs.length];out.push(p[Math.floor(i/gs.length)%p.length]);}
  return out;
}

function spiralPlan(st, want){
  const g=st.gens, plan=[];
  g.forEach((k,i)=>plan.push({focus:k, learned:g.slice(0,i+1), n:i+1}));
  plan.push({focus:null, learned:g.slice(), n:g.length+1, integrate:true});
  const lvl=parseInt(st.id.slice(1),10);
  if(lvl>=8) plan.push({focus:null, learned:g.slice(), n:g.length+2, integrate:true});
  const base=plan.length;
  // 장수(want)만큼 단원을 만들도록 스파이럴 사이클을 반복
  if(want && want>base){
    for(let i=base;i<want;i++){
      const k=g[i%g.length];
      const isInt=(i%(g.length+1)===g.length); // 사이클마다 통합 1회
      plan.push(isInt
        ? {focus:null, learned:g.slice(), n:i+1, integrate:true}
        : {focus:k, learned:g.slice(0,(i%g.length)+1), n:i+1});
    }
  }
  return plan.slice(0, want||base).map((u,idx)=>({...u, n:idx+1}));
}

  const secHTML=secs.map((s,i)=>{let ln='';const cnt=per+(i<rem?1:0);for(let k=0;k<cnt;k++)ln+='<div class="nl"></div>';return `<div class="csec2"><div class="clab">${s[0]}<small>${s[1]}</small></div>${ln}</div>`;}).join('');
  const pageC=`<div class="sheet">
    <div class="top"><div class="bk">${st.nm}</div><div class="no">Unit ${u.n} · Critical Writing</div></div>

    ${useStruct}

    ${secHTML}
    ${fbBox(FRAMEKEY[st.id]||'sprout')}${LOGO}
  </div>`;
  return pageA+pageB+pageC;
}
function generate(){
  const st=findStage(sel.value);
  const want=Math.max(1,Math.min(60,parseInt((document.getElementById('count')||{}).value)||0));
  const plan=spiralPlan(st, want);
  let html=cover(st)+curriculum(st,plan)+readlog(st);
  plan.forEach(u=>html+=unit(st,u));
  document.getElementById('out').innerHTML=html;
  const status=document.getElementById('status'); if(status) status.textContent=`${st.stage} ${st.nm} 워크북 · ${plan.length}단원 (반복→확장)`;
  const f=document.querySelector('.sheet'); if(f) window.scrollTo({top:f.offsetTop-90,behavior:'smooth'});
}
generate();

  s1+='</div>';
  h+=`<div class="sheet">${head('SECTION 1 / 5 · READ &amp; COPY')}<h2>배치고사 · 문장 영작 진단</h2>
     <p class="lead">한글 뜻을 보고 영어 문장으로 쓰세요. 예시는 없습니다. 모르면 비워 두고 넘어갑니다. 연속해서 성공한 <b>가장 높은 레벨</b>이 진입선입니다.</p>
     <div class="meta">Name <u></u> Date <u></u> 교사 <u></u></div>${s1}${FOOT}</div>`;
  // P2 Build & Expand Diagnostic
  let s2='<div class="subh">A · Build (단어로 문장 만들기)</div><div class="items">';
  [1,3,5,7,9].forEach((lv,i)=>{s2+=`<div class="it"><span class="n">${i+1}</span>${TESTS[lv].build[0][0]}<div class="ans"></div></div>`;});
  s2+='</div><div class="subh">B · Expand (문장 늘려쓰기)</div><div class="items">';
  [2,4,6,8,10].forEach((lv,i)=>{s2+=`<div class="it"><span class="n">${i+1}</span>${TESTS[lv].expand[0][0]}<div class="ans"></div></div>`;});
  s2+='</div>';
  h+=`<div class="sheet">${head('SECTION 2 / 5 · BUILD &amp; EXPAND')}<h2>배치고사 · 문장 생산·확장</h2>
     <p class="lead">A. 주어진 단어로 문장을 만드세요. &nbsp; B. 문장을 더 길고 자세하게 늘려 쓰세요.</p>${s2}${FOOT}</div>`;
  // P3 Organizer (중간 난이도 지문)
  const cells=['Who / What','Where','What happened / Why'].map(l=>`<div class="ocell"><div class="lab">${l}</div><div class="fill"><div class="fl"></div><div class="fl"></div><div class="fl"></div><div class="fl"></div></div></div>`).join('');
  h+=`<div class="sheet">${head('SECTION 3 / 5 · THINK')}<h2>배치고사 · Logical Organizer</h2><p class="lead">글을 읽고 조직자를 채우세요. 사고력 수준(Sprout~Creator)을 진단합니다.</p><div class="passage">A boy read a book about the sea. He learned that the ocean is deep and full of life. He felt curious and wanted to explore more.</div><div class="org c3">${cells}</div>${FOOT}</div>`;
  // P4 Writing Sample
  let wl='';for(let i=0;i<9;i++)wl+='<div class="wl"></div>';
  h+=`<div class="sheet">${head('SECTION 4 / 5 · WRITE')}<h2>배치고사 · Writing Sample</h2><p class="lead">배치 레벨에 맞는 프롬프트 1개를 골라 쓰게 하세요. 글쓰기 산출물로 레벨을 확정합니다.</p>
     <div class="box"><b>Writing Prompt (택1)</b>
     <div class="it" style="margin-top:6px;"><span class="lv">L1–2</span> Write 3 sentences about your favorite book.</div>
     <div class="it"><span class="lv">L3–4</span> Retell a story. Use First, Then, Finally.</div>
     <div class="it"><span class="lv">L5–6</span> What is your book about? Why is it important?</div>
     <div class="it"><span class="lv">L7–8</span> What does the author want to show? Give one reason.</div>
     <div class="it"><span class="lv">L9–10</span> What is the main idea, and do you agree?</div></div>
     <div class="sf-meta"><span>제목 Title</span><u></u><span>작가 Author</span><u></u></div>
     <div class="wfw" style="margin-top:10px;">${(function(){let x='';for(let i=0;i<8;i++)x+='<div class="wlw"></div>';return x;})()}</div>${FOOT}</div>`;
  // P5 Teacher Key + Placement decision
  let dxr='';for(let lv=1;lv<=10;lv++){dxr+=`<tr><td style="width:40px;">L${lv}</td><td>${TESTS[lv].dx}</td></tr>`;}
  h+=`<div class="sheet">${head('ANSWER KEY · 교사용')}<h2>진단표 &amp; Placement Key</h2>
     <p class="lead">각 레벨이 진단하는 구조(학생용에는 미노출). 세 진단(모방·생산·확장)과 글쓰기를 종합합니다.</p>
     <table><tr><th>Lv</th><th>진단 구조</th></tr>${dxr}</table>
     <table style="margin-top:10px;"><tr><th>구조 연속정답</th><th>Writing 산출물</th><th>최종 배치</th></tr>
     <tr><td>L1–2</td><td>3문장</td><td class="lv">Level 1–2 · Sprout</td></tr>
     <tr><td>L3–4</td><td>First/Then/Finally</td><td class="lv">Level 3–4 · Explorer</td></tr>
     <tr><td>L5–6</td><td>이유 포함 문단</td><td class="lv">Level 5–6 · Storyteller</td></tr>
     <tr><td>L7–8</td><td>의견+근거</td><td class="lv">Level 7–8 · Thinker</td></tr>
     <tr><td>L9–10</td><td>주장+근거</td><td class="lv">Level 9–10 · Creator</td></tr></table>
     <div class="crit"><b>판정 원칙:</b> 구조·글쓰기 중 <b>가장 낮은 영역</b>을 진입 레벨로 한다(과대 배치 방지). 경계선은 낮은 레벨 시작 후 2주 내 재평가.</div>
     <div class="sign">최종 배치 레벨: <u></u> &nbsp;&nbsp; 교사 <u></u></div>${FOOT}</div>`;
  return h;
}

function run(){
  const t=document.getElementById('type').value;
  let html, label;
  if(t==='place'){html=placement(); label='배치고사 · 2장';}
  else{const lv=parseInt(t.slice(1),10); html=promo(lv); label=`Level ${lv} 승급테스트 · 5장`;}
  document.getElementById('asOut').innerHTML=html;
  document.getElementById('asStatus').textContent=label+' 생성 완료';
  const f=document.querySelector('#asmt-view .sheet'); if(f) window.scrollTo({top:f.offsetTop-70,behavior:'smooth'});
}

document.getElementById('asRunBtn').addEventListener('click',run);
document.getElementById('asPrintBtn').addEventListener('click',function(){window.print();});
run();

})();
</script>
<script>
(function(){
  var wb=document.getElementById('wbld-view'), as=document.getElementById('asmt-view');
  var bWb=document.getElementById('mbWb'), bAs=document.getElementById('mbAs');
  function show(which){
    var wbOn=(which==='wb');
    wb.classList.toggle('active',wbOn); as.classList.toggle('active',!wbOn);
    bWb.classList.toggle('active',wbOn); bAs.classList.toggle('active',!wbOn);
    window.scrollTo({top:0});
  }
  bWb.addEventListener('click',function(){show('wb');});
  bAs.addEventListener('click',function(){show('as');});
})();
</script>
