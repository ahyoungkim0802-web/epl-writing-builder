<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EPL 라이팅빌더 · 생성기</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600&family=IBM+Plex+Sans+KR:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--paper:#FCFAF5;--ink:#2B2622;--soft:#6B6258;--line:#D8CFBF;--line-2:#C9C0B0;
  --who:#5E7C92;--did:#C26544;--what:#C79A3A;--be:#7E9460;}
*{box-sizing:border-box;}
body{margin:0;background:#E7E2D8;color:var(--ink);font-family:'IBM Plex Sans KR',sans-serif;font-weight:300;}
.f{font-family:'Fraunces',serif;}
.controls{position:sticky;top:0;z-index:20;background:#2B2622;color:#F3ECDF;padding:15px 22px;box-shadow:0 2px 10px rgba(0,0,0,.2);}
.controls .title{font-family:'Fraunces',serif;font-weight:600;font-size:16px;margin-bottom:12px;}
.controls .title span{font-family:'IBM Plex Sans KR';font-weight:300;font-size:12.5px;color:#C9BFAE;margin-left:8px;}
.crow{display:flex;flex-wrap:wrap;gap:16px;align-items:flex-end;}
.fld{display:flex;flex-direction:column;gap:4px;}
.fld label{font-size:11px;color:#C9BFAE;}
.fld select,.fld input{font-family:'IBM Plex Sans KR';font-size:14px;padding:8px 11px;border:none;border-radius:8px;background:#F3ECDF;color:#2B2622;}
.fld input[type=number]{width:78px;}
.btn{font-family:'IBM Plex Sans KR';font-weight:500;font-size:14px;border:none;border-radius:8px;padding:10px 20px;cursor:pointer;}
.btn.go{background:#C26544;color:#fff;}.btn.go:hover{background:#a9542f;}.btn.go:disabled{opacity:.55;}
.btn.print{background:transparent;color:#F3ECDF;border:1px solid #6B6258;}
.status{font-size:12.5px;color:#C9BFAE;}
.spin{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;vertical-align:-2px;margin-right:6px;}
@keyframes sp{to{transform:rotate(360deg);}}

#out{padding:20px 0 60px;}
.sheet{background:#fff;width:210mm;max-width:96vw;margin:18px auto;padding:14mm 15mm;position:relative;box-shadow:0 3px 22px rgba(0,0,0,.12);height:296mm;display:flex;flex-direction:column;box-sizing:border-box;overflow:hidden;}
.top{display:flex;justify-content:space-between;align-items:baseline;color:var(--soft);font-size:13px;margin-bottom:14px;}
.top .bk u{display:inline-block;min-width:160px;border-bottom:1px solid var(--line-2);}
.top .no{font-family:'Fraunces',serif;font-style:italic;}
.struct{margin-bottom:14px;}
.struct .nm{font-family:'Fraunces',serif;font-weight:600;font-size:21px;}
.struct .sub{font-size:13px;color:var(--soft);margin-top:2px;}

.cards{display:flex;gap:8px;margin-bottom:6px;}
.card{flex:1;text-align:center;}
.card .lab{border:1.5px solid var(--line-2);border-radius:10px;padding:9px 0;font-family:'Fraunces',serif;font-weight:600;font-size:17px;background:var(--paper);}
.card.who .lab{color:var(--who);}.card.did .lab{color:var(--did);}.card.what .lab{color:var(--what);}
.brain{display:flex;gap:8px;margin-bottom:18px;}
.brain .c{flex:1;height:24px;border-bottom:1px dashed var(--line-2);}

.block-h{font-family:'Fraunces',serif;font-weight:600;font-size:14px;color:var(--ink);margin:0 0 6px;border-bottom:1px solid var(--line);padding-bottom:5px;}
.block-h span{font-family:'IBM Plex Sans KR';font-weight:300;font-size:11.5px;color:var(--soft);margin-left:6px;}
.exlist{margin:0 0 18px;}
.exlist .ex{display:flex;gap:10px;padding:5px 0;font-size:14.5px;align-items:baseline;}
.exlist .ex .n{font-family:'Fraunces',serif;font-style:italic;color:var(--soft);font-size:12px;flex:0 0 14px;}
.exlist .ex .en{font-family:'Fraunces',serif;flex:1;}
.exlist .ex .ko{font-size:12px;color:var(--soft);flex:0 0 40%;text-align:right;}
.line{height:31px;border-bottom:1px solid var(--line);}
/* 구조 연습 (가이드 드릴) */
.prac{flex:1;display:flex;flex-direction:column;justify-content:space-around;min-height:0;padding:4px 0;}
.prac .item .q{font-size:14.5px;}
.prac .item .q .n{font-family:'Fraunces',serif;font-style:italic;color:var(--did);font-size:12px;margin-right:8px;}
.prac .item .q .hint{color:var(--soft);font-size:12px;margin-left:6px;}
.prac .item .ln{height:30px;border-bottom:1px solid var(--line);margin-top:8px;}
.prac .item .q .bl{display:inline-block;min-width:44px;border-bottom:1.4px solid var(--soft);margin:0 3px;vertical-align:baseline;}
/* Words box */
.wordbox{border:1px solid var(--line);border-radius:10px;padding:11px 16px;background:var(--paper);margin-top:10px;}
.wordbox .wh{font-family:'Fraunces',serif;font-weight:600;font-size:13px;color:var(--ink);margin-bottom:7px;}
.wordbox .wh span{font-family:'IBM Plex Sans KR';font-weight:300;font-size:11px;color:var(--soft);margin-left:6px;}
.wordbox .chips{display:flex;flex-wrap:wrap;gap:6px 14px;}
.wordbox .chip{font-family:'Fraunces',serif;font-size:14px;color:var(--ink);}
.practice .line{margin-top:9px;}
/* 남은 공간을 균등하게 채우는 줄 */
.fillzone{flex:1;display:flex;flex-direction:column;min-height:0;}
.fillzone .fl{flex:1;min-height:36px;border-bottom:1px solid var(--line);}

.think{margin-bottom:6px;}
.think .row{display:flex;align-items:flex-end;gap:12px;margin-bottom:17px;}
.think .row .q{flex:0 0 150px;font-family:'Fraunces',serif;font-weight:600;font-size:14px;color:var(--did);line-height:1.3;}
.think .row .q small{display:block;font-family:'IBM Plex Sans KR';font-weight:300;font-size:11px;color:var(--soft);}
.think .row .l{flex:1;height:22px;border-bottom:1px solid var(--line);}
/* 상위 단계: 생각 정리를 페이지 가득 펼침 */
.think.spread{flex:1;display:flex;flex-direction:column;justify-content:space-around;}
.think.spread .row{margin-bottom:0;}
/* 크리티컬 라이팅 페이지 */
.crit{flex:1;display:flex;flex-direction:column;}
.csec{flex:1;display:flex;flex-direction:column;padding:3px 0;}
.csec .clab{font-family:'Fraunces',serif;font-weight:600;font-size:13.5px;color:var(--did);margin-bottom:3px;}
.csec .clab small{font-family:'IBM Plex Sans KR';font-weight:300;font-size:11px;color:var(--soft);margin-left:6px;}
.csec .fillzone{flex:1;}
/* 한 장형 크리티컬: 라벨 + 촘촘한 노트 줄 */
.csec2{margin-bottom:6px;}
.csec2 .clab{font-family:'Fraunces',serif;font-weight:600;font-size:13px;color:var(--did);margin-bottom:2px;}
.csec2 .clab small{font-family:'IBM Plex Sans KR';font-weight:300;font-size:11px;color:var(--soft);margin-left:6px;}
.nl{height:25px;border-bottom:1px solid var(--line);}
/* 배운 구조 활용 안내 */
.usebox{border:1px dashed var(--line-2);border-radius:8px;padding:8px 13px;margin:4px 0 10px;background:var(--paper);}
.usebox .ut{font-size:12.5px;color:var(--ink);font-weight:500;}
.usebox .uchips{display:flex;flex-wrap:wrap;gap:6px 14px;margin-top:5px;}
.usebox .uchip{font-size:12.5px;color:var(--ink);}
.usebox .uchip i{font-family:'Fraunces',serif;font-style:italic;color:var(--soft);font-size:12px;margin-left:3px;}
/* 워크북: 표지·커리큘럼·원서 박스 */
.cover{justify-content:center;align-items:center;text-align:center;}
.cv-brand{font-size:12px;color:var(--soft);letter-spacing:2px;margin-bottom:46px;}
.cv-title{font-family:'Fraunces',serif;font-weight:600;font-size:46px;line-height:1.1;}
.cv-sub{font-size:15px;color:var(--soft);margin-top:12px;}
.cv-stage{font-family:'Fraunces',serif;font-size:22px;color:var(--did);margin-top:64px;}
.cv-struct{font-size:13.5px;color:var(--soft);margin-top:8px;}
.cv-meta{font-size:13px;color:var(--soft);margin-top:90px;}
.cu-intro{font-size:13px;color:var(--soft);margin-bottom:16px;line-height:1.6;}
.cu{display:flex;flex-direction:column;flex:1;justify-content:space-between;}
.cu-row{display:flex;align-items:baseline;gap:11px;border-bottom:1px solid var(--line);padding:6px 0 12px;}
.cu-n{font-family:'Fraunces',serif;font-style:italic;color:var(--did);flex:0 0 66px;font-size:13px;}
.cu-f{font-size:14px;}.cu-f i{font-family:'Fraunces',serif;font-style:italic;color:var(--soft);font-size:12px;margin-left:4px;}
.cu-rev{font-size:11px;color:var(--soft);margin-left:auto;text-align:right;}
.cu-cyc{font-family:'Fraunces',serif;font-style:italic;color:var(--did);font-size:13px;margin:4px 0 8px;}
.cu-foot{margin-top:14px;padding-top:10px;border-top:1px dashed var(--line-2);font-size:13px;color:var(--soft);text-align:center;}
.readbox{border:1px solid var(--did);border-radius:10px;padding:11px 15px;margin-bottom:14px;background:#FBF4EF;}
.readbox .bwh{font-family:'Fraunces',serif;font-weight:600;font-size:14px;color:var(--did);margin-bottom:9px;}
.readbox .bwh span{font-family:'IBM Plex Sans KR';font-weight:300;font-size:11px;color:var(--soft);margin-left:6px;}
.bwgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px 26px;}
.bw{height:24px;border-bottom:1px solid var(--line-2);display:flex;align-items:flex-end;}
.loopbox{border:1px solid var(--did);border-radius:10px;padding:12px 14px;margin:6px 0 16px;text-align:center;background:#FBF4EF;font-family:'Fraunces',serif;font-size:14px;color:var(--did);}
.loopbox b{color:var(--ink);}
.loopbox small{display:block;font-family:'IBM Plex Sans KR';font-weight:300;font-size:11px;color:var(--soft);margin-top:4px;}
.bwn{font-family:'Fraunces',serif;font-style:italic;color:var(--soft);font-size:10px;margin-bottom:1px;}
/* 직접 문장 만들기 */
.makelist{flex:1;display:flex;flex-direction:column;justify-content:space-around;margin-top:6px;}
.mk{display:flex;align-items:flex-end;gap:10px;}
.mk .mn{font-family:'Fraunces',serif;font-style:italic;color:var(--soft);font-size:13px;flex:0 0 16px;}
.mk .ml{flex:1;border-bottom:1px solid var(--line);height:22px;}
.sf-meta{display:flex;align-items:baseline;gap:6px;font-size:13px;color:var(--ink);margin:8px 0 4px;flex-wrap:wrap;}
.sf-meta span{color:var(--soft);font-size:12px;}
.sf-meta u{display:inline-block;border-bottom:1px solid var(--line-2);min-width:130px;margin-right:16px;}
.sl{display:flex;align-items:flex-end;gap:8px;margin-top:11px;}
.sl .st{font-family:'Fraunces',serif;font-style:italic;color:var(--soft);font-size:14px;white-space:nowrap;}
.sl .sline{flex:1;border-bottom:1px solid var(--line);height:24px;}

.fb{margin-top:24px;border-top:1px solid var(--line);padding-top:12px;display:flex;justify-content:space-between;align-items:center;color:var(--soft);font-size:12.5px;}
.fb .checks{display:flex;gap:14px;flex-wrap:wrap;}
.fb .checks span{display:inline-flex;align-items:center;gap:5px;}
.fb .checks span::before{content:"";width:13px;height:13px;border:1.4px solid var(--line-2);border-radius:3px;}
.fb .stamp{width:46px;height:46px;border:1px dashed var(--line-2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;text-align:center;flex:0 0 46px;}
.logo{margin-top:14px;text-align:right;color:var(--soft);font-size:12px;line-height:1.25;}
.logo b{display:block;font-family:'Fraunces',serif;font-size:14px;color:var(--ink);}

@media print{@page{size:A4;margin:0;}html,body{background:#fff;margin:0;padding:0;}.controls{display:none;}#out{padding:0;margin:0;}.sheet{width:210mm;height:296mm;max-width:none;margin:0;box-shadow:none;overflow:hidden;page-break-after:always;break-after:page;}.sheet:last-child{page-break-after:auto;break-after:auto;}}
@media(max-width:680px){.sheet{padding:28px 20px;}.exlist .ex{flex-wrap:wrap;}.exlist .ex .ko{text-align:left;flex:1;}}
</style>
</head>
<body>

<div class="controls">
  <div class="title">EPL 라이팅빌더 · 생성기 <span>구조 단계를 고르면 그 단계의 북라이팅 노트를 자동 생성</span></div>
  <div class="crow">
    <div class="fld"><label>구조 단계 (1~5)</label><select id="stage" style="min-width:280px;"></select></div>
    <div class="fld"><label>장수 (회차)</label><input type="number" id="count" value="16" min="1" max="60"></div>
    <button class="btn go" id="goBtn" onclick="generate()">만들기</button>
    <button class="btn print" onclick="window.print()">🖨 인쇄 / PDF</button>
    <span class="status" id="status"></span>
  </div>
</div>
<div id="out"></div>

<script>
/* 5단계 (2개씩 통합) — 문법은 예문으로 구체화 */
const STAGES=[
 {id:'s1',stage:'1단계',nm:'기본 문장',sub:'주어+동사 · 무엇을 · be+상태',gens:['g1','g2','be'],slots:[['주인공','who'],['동작','did'],['대상','what']]},
 {id:'s2',stage:'2단계',nm:'수식어·과거',sub:'형용사 · 부사 · 과거형',gens:['g3','adv','g5'],slots:[['주인공','who'],['동작','did'],['대상','what']]},
 {id:'s3',stage:'3단계',nm:'부정·의문',sub:'부정문 · 의문문 · 의문사',gens:['neg','ques','indir'],slots:[['주인공','who'],['동작','did'],['대상','what']]},
 {id:'s4',stage:'4단계',nm:'미래·조동사',sub:'미래(will) · can · must',gens:['fut','can','must'],slots:[['주인공','who'],['동작','did'],['대상','what']]},
 {id:'s5',stage:'5단계',nm:'비교·수량',sub:'수량 · 비교급 · 최상급',gens:['quant','g8','sup'],slots:[['주인공','who'],['동작','did'],['대상','what']]},
 {id:'s6',stage:'6단계',nm:'to·동명사·연결',sub:'to부정사 · 동명사 · 접속사',gens:['g7','ger','g6'],slots:[['주인공','who'],['동작','did'],['대상','what']]},
 {id:'s7',stage:'7단계',nm:'문장형식·완료',sub:'5형식 · that절 · 현재완료',gens:['g10','that','perf'],slots:[['주인공','who'],['동작','did'],['대상','what']]},
 {id:'s8',stage:'8단계',nm:'수동·관계사',sub:'수동태 · 관계대명사 · 관계부사',gens:['pass','g9','reladv'],slots:[['주인공','who'],['동작','did'],['대상','what']]},
 {id:'s9',stage:'9단계',nm:'통합 라이팅',sub:'배운 구조 종합',gens:['g2','g7','g8'],slots:[['주인공','who'],['동작','did'],['대상','what']]},
 {id:'s10',stage:'10단계',nm:'비판적 글쓰기',sub:'주장·근거·반론·결론',gens:['g10','subj','g9'],slots:[['주인공','who'],['동작','did'],['대상','what']]}
];
/* ===== 조합형 생성 엔진 v2 — 한 장 안에서 주어·단어가 겹치지 않게 순환 배치 ===== */
const HT=t=>`<span class="hint">(${t})</span>`;
function sh(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

const subjS=[['The dog','개가'],['The cat','고양이가'],['A bird','새가'],['The rabbit','토끼가'],['The boy','소년이'],['The girl','소녀가'],['A frog','개구리가'],['The horse','말이'],['A duck','오리가'],['A monkey','원숭이가'],['The baby','아기가'],['A lion','사자가'],['The fox','여우가'],['A bear','곰이'],['The puppy','강아지가'],['A turtle','거북이가'],['An owl','부엉이가'],['A panda','판다가'],['A pig','돼지가'],['The deer','사슴이'],['A bee','벌이'],['The kitten','새끼고양이가']];

const subjP=[['I','나는'],['We','우리는'],['They','그들은'],['The children','아이들은'],['My friends','친구들은'],['You','너는'],['The kids','꼬마들은'],['Tom and I','Tom과 나는'],['The students','학생들은'],['The twins','쌍둥이는']];
const vo=[['like','dogs','개를','좋아해요'],['read','a book','책을','읽어요'],['eat','an apple','사과를','먹어요'],['want','a toy','장난감을','원해요'],['have','a pet','반려동물을','키워요'],['see','a star','별을','봐요'],['make','a cake','케이크를','만들어요'],['play','soccer','축구를','해요'],['draw','a picture','그림을','그려요'],['watch','a movie','영화를','봐요'],['catch','a ball','공을','잡아요'],['open','the door','문을','열어요'],['find','a key','열쇠를','찾아요'],['ride','a bike','자전거를','타요'],['paint','a wall','벽을','칠해요'],['build','a tower','탑을','쌓아요']];

const nounObj=[['dog','개를'],['cat','고양이를'],['ball','공을'],['hat','모자를'],['car','차를'],['book','책을'],['bird','새를'],['box','상자를'],['house','집을'],['tree','나무를'],['robot','로봇을'],['kite','연을'],['bag','가방을'],['flower','꽃을']];
const place=[['in the park','공원에서','어디서'],['at home','집에서','어디서'],['at school','학교에서','어디서'],['in the garden','정원에서','어디서'],['in the sea','바다에서','어디서'],['in the morning','아침에','언제'],['at night','밤에','언제'],['after school','방과 후에','언제'],['on Sunday','일요일에','언제'],['in the room','방에서','어디서'],['by the river','강가에서','어디서'],['before dinner','저녁 전에','언제'],['on the hill','언덕에서','어디서'],['every day','매일','언제']];
const VB5=[['play','played','will play','am playing','놀다'],['read','read','will read','am reading','읽다'],['watch','watched','will watch','am watching','보다'],['walk','walked','will walk','am walking','걷다'],['help','helped','will help','am helping','돕다'],['cook','cooked','will cook','am cooking','요리하다'],['paint','painted','will paint','am painting','그리다'],['clean','cleaned','will clean','am cleaning','청소하다'],['jump','jumped','will jump','am jumping','뛰다'],['call','called','will call','am calling','전화하다']];

function genItems(stage,n){
  const gs=stage.gens, per=Math.ceil(n/gs.length)+3;
  const pools=gs.map(g=>(GEN[g]||GEN.g1)(per));
  const out=[];
  for(let i=0;i<n;i++){const p=pools[i%gs.length];out.push(p[Math.floor(i/gs.length)%p.length]);}
  return out;
}

function fzLines(n){let s='';for(let i=0;i<n;i++)s+='<div class="fl"></div>';return s;}
const LOGO=`<div class="logo"><b>EPL</b>원서읽는 아이들 영어학원</div>`;
const FB=`<div class="fb"><div class="checks"><span>구조</span><span>때</span><span>철자</span><span>논리 흐름</span></div><div class="stamp">선생님<br>도장</div></div>`;

function spiralPlan(st, want){
  const g=st.gens, plan=[];
  g.forEach((k,i)=>plan.push({focus:k, learned:g.slice(0,i+1), n:i+1}));
  plan.push({focus:null, learned:g.slice(), n:g.length+1, integrate:true});
  const lvl=parseInt(st.id.slice(1),10);
  if(lvl>=8) plan.push({focus:null, learned:g.slice(), n:g.length+2, integrate:true});
  const base=plan.length;
  // 장수(want)만큼 단원을 만들도록 스파이럴 사이클을 반복
  if(want && want>base){
    for(let i=base;i<want;i++){
      const k=g[i%g.length];
      const isInt=(i%(g.length+1)===g.length); // 사이클마다 통합 1회
      plan.push(isInt
        ? {focus:null, learned:g.slice(), n:i+1, integrate:true}
        : {focus:k, learned:g.slice(0,(i%g.length)+1), n:i+1});
    }
  }
  return plan.slice(0, want||base).map((u,idx)=>({...u, n:idx+1}));
}
const ENST={
 s1:{n:'Basic Sentences',s:'Subject + Verb · Object · Be + State'},
 s2:{n:'Modifiers & Past',s:'Adjectives · Adverbs · Past Tense'},
 s3:{n:'Negatives & Questions',s:'Negation · Questions · Wh-words'},
 s4:{n:'Future & Modals',s:'Will · Can · Must'},
 s5:{n:'Comparison & Quantity',s:'Quantity · Comparative · Superlative'},
 s6:{n:'To-infinitive, Gerund & Linking',s:'To-infinitive · Gerund · Conjunctions'},
 s7:{n:'Sentence Patterns & Perfect',s:'Five Patterns · That-clause · Present Perfect'},
 s8:{n:'Passive & Relatives',s:'Passive · Relative Pronoun · Relative Adverb'},
 s9:{n:'Integrated Writing',s:'Combining Learned Structures'},
 s10:{n:'Critical Writing',s:'Claim · Evidence · Counter · Conclusion'}
};
function cover(st){
  const e=ENST[st.id]||{n:st.nm,s:st.sub};
  return `<div class="sheet cover">
    <div class="cv-brand">EPL · Empower · Practice · Literacy</div>
    <div class="cv-title">EPL Writing Builder</div>
    <div class="cv-sub">Thinking-Based English · Reading Words → Sentence Structure → Logical Thinking → Writing</div>
    <div class="cv-stage">Level ${st.id.slice(1)} · ${e.n}</div>
    <div class="cv-struct">${e.s}</div>
    <div class="cv-meta">Name ____________   ·   Date ____________</div>
  </div>`;
}
function curriculum(st,plan){
  const g=st.gens, cyc=g.length+1, cycles=Math.ceil(plan.length/cyc);
  let rows='';
  g.forEach((k,i)=>{
    const tag = i===0?'➕ 새 구조':'➕';
    const rev = i>0 ? '<span class="cu-rev">복습 '+g.slice(0,i).map(x=>EASY[x][0]).join(' · ')+'</span>' : '';
    rows += '<div class="cu-row"><span class="cu-n">'+tag+'</span><span class="cu-f">'+EASY[k][0]+' <i>'+EASY[k][1]+'</i></span>'+rev+'</div>';
  });
  rows += '<div class="cu-row"><span class="cu-n">🔁 통합</span><span class="cu-f">배운 구조 모두 합쳐 길게 쓰기 <i>'+st.sub+'</i></span><span class="cu-rev">My Writing</span></div>';
  return `<div class="sheet">
    <div class="block-h">Table of Contents <span>${st.stage} ${st.nm}</span></div>
    <div class="loopbox">📖 <b>Reading Words</b> → 🧩 <b>Sentence Structure</b> → 🧠 <b>Logical Thinking</b> → ✍️ <b>Writing</b><small>EPL Thinking-Based English · 4-Step Writing Process</small></div>
    <div class="cu-intro">아래는 <b>1사이클</b>(반복 단위)입니다. 한 구조를 배우고 → 복습하며 더하고 → 통합해 길게 씁니다. 중심은 <b>Reading Words → Writing</b>, <b>Logical Thinking</b>은 모든 단원 필수.</div>
    <div class="cu-cyc">1 Cycle = ${cyc}단원</div>
    <div class="cu">${rows}</div>
    <div class="cu-foot">이 사이클을 <b>${cycles}회 반복</b> · 총 <b>${plan.length}단원</b> (회차마다 책 단어·문장은 새로 생성)</div>
    ${LOGO}
  </div>`;
}
function unit(st,u){
  const idx=u.n-1, lvl=parseInt(st.id.slice(1),10);
  const FR=FRAMES[FRAMEKEY[st.id]||'sprout'];
  const focus=u.focus;
  const model = focus ? (GEN[focus]||GEN.g1)(1)[0] : genItems(st,1)[0];
  const cardSlots = focus ? (CARDS[focus]||[]) : [];
  const cards=cardSlots.map(s=>`<div class="card ${s[1]}"><div class="lab">${s[0]}</div></div>`).join('');
  const focusName = focus? EASY[focus][0] : '배운 구조 통합';
  const focusEx = focus? EASY[focus][1] : st.sub;
  const newTag = u.integrate? '🔁 통합' : '➕ 새 구조';
  const learnedChips=u.learned.map(g=>`<span class="uchip">☐ ${EASY[g][0]} <i>${EASY[g][1]}</i></span>`).join('');
  const useStruct=`<div class="usebox"><span class="ut">✓ 배운 표현을 글에 써 보세요${u.integrate?' — 가능한 많이!':' (2개 이상)'}</span><div class="uchips">${learnedChips}</div></div>`;
  const bwSlots=Array.from({length:10}).map((_,i)=>`<div class="bw"><span class="bwn">${i+1}</span></div>`).join('');
  const readbox=`<div class="readbox"><div class="bwh">📖 오늘 읽은 책에서 나온 단어 10개 <span>읽으면서 만난 단어를 적고, 그 단어로 아래 문장을 만들어요</span></div><div class="bwgrid">${bwSlots}</div></div>`;
  const thinkRows=(THINK[THINKKEY[st.id]]||THINK.whodidwhat).map(t=>`<div class="row"><div class="q">${t[0]}<small>${t[1]}</small></div><div class="l"></div></div>`).join('');
  const mk=Array.from({length:9}).map((_,i)=>`<div class="mk"><span class="mn">${i+1}</span><div class="ml"></div></div>`).join('');

  const pageA=`<div class="sheet">
    <div class="top"><div class="bk">${st.stage} · ${st.nm}</div><div class="no">Unit ${u.n} · ${newTag}</div></div>
    ${readbox}
    <div class="struct"><div class="nm">${focusName}</div><div class="sub">${focusEx}　·　예) ${model.en} (${model.ko})</div></div>
    ${cards?`<div class="cards">${cards}</div>`:''}
    <div class="block-h">구조 연습 <span>위에 적은 책 단어로 「${focusName}」 문장을 만들어요</span></div>
    <div class="makelist">${mk}</div>
    ${LOGO}
  </div>`;

  const adv = u.integrate && lvl>=9;
  if(!adv){
    const metaRow=`<div class="sf-meta"><span>제목 Title</span><u></u><span>작가 Author</span><u></u></div>`;
    if(lvl<=4){
      const pageB=`<div class="sheet">
        <div class="top"><div class="bk">${st.nm}</div><div class="no">Unit ${u.n} · Write</div></div>
        <div class="block-h">Logical Writing · 생각 조직 <span>노트 조직자로 읽은 내용을 정리해요</span></div>
        <div class="think">${thinkRows}</div>
        <div class="block-h">My Writing <span>${FR.name}</span></div>
        ${metaRow}
        ${useStruct}
        <div class="sl"><span class="st">${FR.open}</span><span class="sline"></span></div>
        <div class="fillzone">${fzLines(FR.lines)}</div>
        <div class="sl"><span class="st">${FR.r1}</span><span class="sline"></span></div>
        <div class="sl"><span class="st">${FR.r2}</span><span class="sline"></span></div>
        ${FB}${LOGO}
      </div>`;
      return pageA+pageB;
    }
    const thinkPage=`<div class="sheet">
      <div class="top"><div class="bk">${st.nm}</div><div class="no">Unit ${u.n} · 생각 조직</div></div>
      <div class="block-h">Logical Writing · 생각 조직 <span>노트 조직자로 정리 → 다음 장에 길게 써요</span></div>
      <div class="think spread">${thinkRows}</div>${LOGO}
    </div>`;
    const writePage=`<div class="sheet">
      <div class="top"><div class="bk">${st.nm}</div><div class="no">Unit ${u.n} · My Writing</div></div>
      <div class="block-h">My Writing <span>${FR.name}</span></div>
      ${metaRow}
      ${useStruct}
      <div class="sl"><span class="st">${FR.open}</span><span class="sline"></span></div>
      <div class="fillzone">${fzLines(14)}</div>
      <div class="sl"><span class="st">${FR.r1}</span><span class="sline"></span></div>
      <div class="sl"><span class="st">${FR.r2}</span><span class="sline"></span></div>
      ${FB}${LOGO}
    </div>`;
    return pageA+thinkPage+writePage;
  }
  const pageB=`<div class="sheet">
    <div class="top"><div class="bk">${st.nm}</div><div class="no">Unit ${u.n} · 생각</div></div>
    <div class="block-h">Logical Writing · 생각 조직 <span>노트 조직자로 정리 → 다음 장에 써요</span></div>
    <div class="think spread">${thinkRows}</div>${LOGO}
  </div>`;
  const secs=CRIT[CRITKEY[st.id]]||CRIT.g7;
  const budget=28, per=Math.floor(budget/secs.length), rem=budget%secs.length;
  const secHTML=secs.map((s,i)=>{let ln='';const cnt=per+(i<rem?1:0);for(let k=0;k<cnt;k++)ln+='<div class="nl"></div>';return `<div class="csec2"><div class="clab">${s[0]}<small>${s[1]}</small></div>${ln}</div>`;}).join('');
  const pageC=`<div class="sheet">
    <div class="top"><div class="bk">${st.nm}</div><div class="no">Unit ${u.n} · Critical Writing</div></div>
    <div class="block-h">Critical Writing · 깊이 있는 글쓰기 <span>원서에 대한 내 생각을 주장·근거로</span></div>
    <div class="sf-meta"><span>제목 Title</span><u></u><span>작가 Author</span><u></u></div>
    ${useStruct}
    <div class="sl"><span class="st">I think this book is</span><span class="sline"></span></div>
    ${secHTML}
    ${FB}${LOGO}
  </div>`;
  return pageA+pageB+pageC;
}
function generate(){
  const st=findStage(sel.value);
  const want=Math.max(1,Math.min(60,parseInt((document.getElementById('count')||{}).value)||0));
  const plan=spiralPlan(st, want);
  let html=cover(st)+curriculum(st,plan);
  plan.forEach(u=>html+=unit(st,u));
  document.getElementById('out').innerHTML=html;
  const status=document.getElementById('status'); if(status) status.textContent=`${st.stage} ${st.nm} 워크북 · ${plan.length}단원 (반복→확장)`;
  const f=document.querySelector('.sheet'); if(f) window.scrollTo({top:f.offsetTop-90,behavior:'smooth'});
}
generate();
